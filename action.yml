name: Cypress Reusable Test Workflow

# ─────────────────────────────────────────────────────────────────────────────
# This is a REUSABLE workflow.  Call it from any repository like:
#
#   jobs:
#     run-tests:
#       uses: praveenjp12/cypress-parallel@v1.0.0
#       with:
#         folderName: cypress/e2e
#         reportFolderName: reports
#         numberOfParallel: 3
#         environmentVariables: 'BASE_URL=https://example.com,ENV=staging'
#         browserName: chrome
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_call:
    inputs:
      folderName:
        description: 'Relative path to the folder containing spec files (e.g. cypress/e2e)'
        required: false
        type: string
        default: 'cypress/e2e'

      reportFolderName:
        description: 'Relative path to the folder where test reports are written (e.g. reports)'
        required: false
        type: string
        default: 'reports'

      numberOfParallel:
        description: 'Number of parallel containers to split tests across (1–10)'
        required: false
        type: number
        default: 3

      environmentVariables:
        description: 'Comma-separated key=value pairs passed to --env, e.g. BASE_URL=https://x.com,ENV=staging'
        required: false
        type: string
        default: ''

      browserName:
        description: 'Browser to run tests in (chrome | firefox | edge)'
        required: false
        type: string
        default: 'chrome'

# ─────────────────────────────────────────────────────────────────────────────
# Job 1 – Run Cypress tests in parallel containers
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  # ---------------------------------------------------------------------------
  # Pre-compute the list of container indices once so we can use it in the
  # matrix without hard-coding the value.
  # ---------------------------------------------------------------------------
  setup:
    name: Build container index list
    runs-on: ubuntu-latest
    outputs:
      containers: ${{ steps.set-containers.outputs.containers }}
    steps:
      - name: Generate container indices
        id: set-containers
        # Produce a JSON array like [0,1,2] from the numberOfParallel input
        run: |
          CONTAINERS=$(python3 -c "import json; n=${{ inputs.numberOfParallel }}; print(json.dumps(list(range(n))))")
          echo "containers=$CONTAINERS" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Parallel test run
  # ---------------------------------------------------------------------------
  cypress-run:
    name: 'Cypress run – container ${{ matrix.container }}'
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        container: ${{ fromJson(needs.setup.outputs.containers) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout workflow repository
        uses: actions/checkout@v4
        with:
          repository: praveenjp12/reporttest
          path: .workflow-repo
          ref: main # Target latest main or an explicit tag

      # Cache node_modules across runs keyed on package-lock.json
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Cypress binary
        run: npx cypress install

      # Determine which spec files this container should run
      - name: Resolve spec files for this container
        id: specs
        run: |
          SPEC=$(node .workflow-repo/index.js \
            ${{ matrix.container }} \
            ${{ inputs.numberOfParallel }} \
            ./${{ inputs.folderName }})
          echo "spec=$SPEC" >> "$GITHUB_OUTPUT"
          echo "Container ${{ matrix.container }} will run: $SPEC"

      # Build the optional --env flag only when environmentVariables is non-empty
      - name: Run Cypress tests
        run: |
          ENV_FLAG=""
          if [ -n "${{ inputs.environmentVariables }}" ]; then
            ENV_FLAG="--env ${{ inputs.environmentVariables }}"
          fi
          npx cypress run \
            --spec "${{ steps.specs.outputs.spec }}" \
            --browser ${{ inputs.browserName }} \
            $ENV_FLAG
        env:
          # Make sure Cypress writes reports to the configured folder by
          # forwarding common reporter env vars if present.
          CYPRESS_REPORT_DIR: ${{ inputs.reportFolderName }}

      # Zip and upload the per-container report folder so the merge job can
      # download all of them later.  Upload even if tests failed.
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-container-${{ matrix.container }}
          path: ${{ inputs.reportFolderName }}/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# Job 2 – Merge all per-container reports and generate a single HTML report
# Runs after EVERY container finishes (pass or fail).
# ─────────────────────────────────────────────────────────────────────────────
  merge-and-report:
    name: Merge reports & generate consolidated HTML
    needs: cypress-run
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-

      - name: Install dependencies
        run: npm ci --ignore-scripts

      # Download every per-container report artifact into separate sub-folders
      - name: Download all report artifacts
        uses: actions/download-artifact@v4
        with:
          # Prefix pattern – downloads all artifacts named report-container-*
          pattern: report-container-*
          path: merged-artifacts/

      # Flatten the downloaded JSON report files into one reports/ folder so
      # the reporter can glob them.  The HTML output file is kept separate.
      - name: Merge JSON report files
        run: |
          mkdir -p ${{ inputs.reportFolderName }}
          find merged-artifacts/ -type f -name '*.json' \
            -not -name '.screenshot-map.json' \
            -not -name '.video-map.json' \
            | while read f; do
                cp "$f" "${{ inputs.reportFolderName }}/$(basename "$f" .json)-$(uuidgen).json"
              done
          echo "Collected JSON files:"
          ls -1 ${{ inputs.reportFolderName }}/

      # Merge screenshot maps from each container into one combined map
      - name: Merge screenshot maps
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const artifactsDir = 'merged-artifacts';
          const outFile = path.join('${{ inputs.reportFolderName }}', '.screenshot-map.json');

          let combined = {};
          const dirs = fs.readdirSync(artifactsDir, { withFileTypes: true })
            .filter(e => e.isDirectory())
            .map(e => path.join(artifactsDir, e.name));

          dirs.forEach(dir => {
            const mapFile = path.join(dir, '.screenshot-map.json');
            if (fs.existsSync(mapFile)) {
              try {
                Object.assign(combined, JSON.parse(fs.readFileSync(mapFile, 'utf8')));
              } catch (_) {}
            }
          });

          fs.writeFileSync(outFile, JSON.stringify(combined, null, 2));
          console.log('Screenshot map entries:', Object.keys(combined).length);
          EOF

      # Generate the consolidated HTML report
      - name: Generate consolidated HTML report
        run: |
          node node_modules/cypress-json-html-reporter/dist/cjs/index.js \
            generate-html \
            ${{ inputs.reportFolderName }} \
            ${{ inputs.reportFolderName }}/consolidated-report.html

      # Zip and upload the final consolidated report
      - name: Upload consolidated report
        uses: actions/upload-artifact@v4
        with:
          name: consolidated-test-report
          path: ${{ inputs.reportFolderName }}/
          retention-days: 14